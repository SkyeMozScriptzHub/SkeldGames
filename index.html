<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Quests — Skeld.G</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111111; --surface: #1a1a1a; --surface2: #222222; --surface3: #2a2a2a;
    --border: rgba(255,255,255,0.07); --text: #f0f0f0; --text-muted: #888888; --text-dim: #555555;
    --accent: #4ade80; --red: #f87171; --bean: #e05c3a;
    --header-h: 60px; --nav-h: 64px; --radius: 16px; --radius-sm: 10px;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  #header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--header-h); background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; gap: 8px; }
  .header-logo { display: flex; align-items: center; gap: 8px; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 15px; color: var(--text); letter-spacing: -0.5px; text-decoration: none; flex-shrink: 0; }
  .header-logo span { color: var(--accent); }
  .header-title { font-size: 14px; font-weight: 700; color: var(--text-muted); text-align: center; flex: 1; }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .beans-badge { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px 4px 6px; font-size: 13px; font-weight: 800; color: var(--bean); }
  .beans-badge img { width: 18px; height: 18px; object-fit: contain; }
  .avatar-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--surface3); border: 2px solid var(--border); overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; }
  .avatar-btn img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .avatar-btn svg { width: 18px; height: 18px; fill: var(--text-muted); }

  #app { padding: calc(var(--header-h) + 20px) 16px 20px; min-height: 100vh; padding-bottom: calc(var(--nav-h) + 20px); }

  /* SUMMARY CARD */
  .quests-summary {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .qs-left { flex: 1; }
  .qs-left h2 { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
  .qs-left p { font-size: 13px; color: var(--text-muted); }
  .qs-beans { display: flex; align-items: center; gap: 6px; font-size: 22px; font-weight: 900; color: var(--bean); flex-shrink: 0; }
  .qs-beans img { width: 24px; height: 24px; object-fit: contain; }

  /* QUEST CARDS */
  .section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; margin-top: 20px; }

  .quest-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 14px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
  }
  .quest-card:hover { border-color: rgba(255,255,255,0.1); transform: translateY(-1px); }
  .quest-card.complete { border-color: rgba(74,222,128,0.2); }
  .quest-card.complete::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(74,222,128,0.04) 0%, transparent 60%); pointer-events: none; }
  .quest-card.claimed { opacity: 0.6; }

  .quest-icon-wrap {
    width: 44px; height: 44px; border-radius: 12px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .quest-icon-wrap svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .quest-icon-wrap.done { background: rgba(74,222,128,0.15); }
  .quest-icon-wrap.done svg { stroke: var(--accent); }

  .quest-body { flex: 1; min-width: 0; }
  .quest-title { font-size: 14px; font-weight: 800; margin-bottom: 2px; }
  .quest-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .quest-bar { height: 5px; background: var(--surface3); border-radius: 5px; overflow: hidden; margin-bottom: 5px; }
  .quest-bar-fill { height: 100%; background: var(--accent); border-radius: 5px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .quest-bar-fill.done { background: var(--accent); }
  .quest-counts { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; }

  .quest-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .quest-reward-badge { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 900; color: var(--bean); }
  .quest-reward-badge img { width: 14px; height: 14px; object-fit: contain; }
  .btn-claim {
    background: var(--accent); color: #111; border: none;
    font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 900;
    border-radius: 8px; padding: 6px 12px; cursor: pointer;
    transition: background 0.18s, transform 0.15s;
    white-space: nowrap;
  }
  .btn-claim:hover { background: #22c55e; }
  .btn-claim:active { transform: scale(0.95); }
  .btn-claimed { background: var(--surface3); color: var(--text-muted); border: 1px solid var(--border); font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; border-radius: 8px; padding: 6px 12px; cursor: default; }

  /* AUTH OVERLAY */
  #auth-overlay { position: fixed; inset: 0; z-index: 200; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; padding: 32px 24px; }
  #auth-overlay.hidden { display: none; }
  .auth-logo { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -1px; }
  .auth-logo span { color: var(--accent); }
  .auth-tagline { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 40px; line-height: 1.5; }
  .auth-art { width: 120px; height: 120px; margin-bottom: 28px; display: flex; align-items: center; justify-content: center; }
  .btn-google { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; border-radius: var(--radius-sm); padding: 13px 24px; cursor: pointer; transition: background 0.2s, transform 0.15s; width: 100%; max-width: 320px; justify-content: center; }
  .btn-google:hover { background: var(--surface2); }
  .btn-google:active { transform: scale(0.97); }
  .google-icon { width: 20px; height: 20px; }

  /* BOTTOM NAV */
  #bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; height: var(--nav-h); background: var(--bg); border-top: 1px solid var(--border); display: flex; align-items: stretch; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; -webkit-tap-highlight-color: transparent; position: relative; padding-bottom: 6px; text-decoration: none; }
  .nav-item svg { width: 22px; height: 22px; stroke: var(--text-dim); transition: stroke 0.15s; stroke-width: 2; fill: none; }
  .nav-item span { font-size: 10px; font-weight: 700; color: var(--text-dim); transition: color 0.15s; }
  .nav-item.active svg { stroke: var(--accent); }
  .nav-item.active span { color: var(--accent); }
  .nav-item.active::after { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: var(--accent); border-radius: 0 0 2px 2px; }

  /* Beans earn animation */
  .beans-earn-pop { position: fixed; z-index: 9999; font-size: 16px; font-weight: 900; color: var(--bean); font-family: 'Nunito', sans-serif; pointer-events: none; animation: beansPop 1.4s ease forwards; }
  @keyframes beansPop { 0% { opacity: 1; transform: translateY(0) scale(1); } 60% { opacity: 1; transform: translateY(-40px) scale(1.2); } 100% { opacity: 0; transform: translateY(-70px) scale(0.9); } }

  .spinner { width: 40px; height: 40px; border: 3px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #toast { position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%; z-index: 999; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 18px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 900px) { #app { max-width: 680px; margin: 0 auto; } }
</style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="auth-overlay">
  <div class="auth-art">
    <svg viewBox="0 0 120 120" fill="none"><ellipse cx="60" cy="85" rx="30" ry="18" fill="#1a1a1a"/><rect x="30" y="55" width="60" height="38" rx="14" fill="#4ade80"/><ellipse cx="60" cy="42" rx="26" ry="28" fill="#4ade80"/><rect x="36" y="30" width="48" height="22" rx="11" fill="#1a1a1a" opacity="0.9"/><rect x="38" y="32" width="44" height="18" rx="9" fill="#60a5fa" opacity="0.85"/><rect x="28" y="72" width="18" height="26" rx="9" fill="#4ade80"/><rect x="74" y="72" width="18" height="26" rx="9" fill="#4ade80"/></svg>
  </div>
  <div class="auth-logo">Skeld<span>.</span>G</div>
  <div class="auth-tagline">Sign in to view your quests.</div>
  <button class="btn-google" id="btn-google-signin" onclick="signInWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </button>
</div>

<!-- HEADER -->
<div id="header">
  <a class="header-logo" href="/"><span>⬡</span> Skeld.G</a>
  <div class="header-title">Quests</div>
  <div class="header-right">
    <div class="beans-badge" id="beans-badge-header">
      <img src="/bean.png" alt="bean" onerror="this.style.display='none';this.nextSibling.style.display='inline'"/>

</div>

  <div class="quests-summary">
    <div class="qs-left">
      <h2>Daily Quests</h2>
      <p id="qs-sub">Loading your progress…</p>

</div>

<!-- BOTTOM NAV -->
<nav id="bottom-nav">
  <a class="nav-item" href="/">
    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCIkS8aU3NyKPH2EWqLNLjKxxg7y7kKu8M",
    authDomain: "skeld-g.firebaseapp.com",
    projectId: "skeld-g",
    storageBucket: "skeld-g.firebasestorage.app",
    messagingSenderId: "474209822056",
    appId: "1:474209822056:web:eee11ece0da8f1cfd4a2dd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._auth = auth;
  window._db_doc = (path) => doc(db, ...path.split('/'));
  window._fs_getDoc = getDoc;
  window._fs_updateDoc = updateDoc;
  window._fs_increment = increment;

  window.signInWithGoogle = async () => {
    try { await signInWithPopup(auth, new GoogleAuthProvider()); }
    catch(e) { showToast('Sign in failed.'); }
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById('auth-overlay').classList.add('hidden');
      const ref = doc(db, 'users', user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, { displayName: user.displayName || 'Crewmate', photoURL: user.photoURL || '', email: user.email || '', beans: 100, inventory: [], gamesPlayed: 0, questsCompleted: 0, quest_play5: 0, quest_play10: 0, quest_play20: 0, quest_visitShop: 0, quest_login3: 1, claimed_play5: false, claimed_play10: false, claimed_play20: false, claimed_visitShop: false, claimed_login3: false, createdAt: serverTimestamp(), lastLogin: serverTimestamp() });
      }
      const data = (await getDoc(ref)).data();
      window._userData = data;
      window._userUid = user.uid;

      const av = user.photoURL;
      if (av) {
        document.getElementById('header-avatar').innerHTML = `<img src="${av}" alt="avatar"/>`;
      }

      updateBeansUI(data.beans ?? 0);
      renderQuests(data);
    } else {
      document.getElementById('auth-overlay').classList.remove('hidden');
    }
  });

  window.claimQuest = async function(key) {
    const uid = window._userUid;
    if (!uid) return;
    const QUEST_DEFS = window._QUEST_DEFS;
    const quest = QUEST_DEFS.find(q => q.key === key);
    if (!quest) return;

    const data = window._userData;
    const progress = data[key] ?? 0;
    const claimedKey = 'claimed_' + key.replace('quest_', '');

    if (progress < quest.max) { showToast('Quest not complete yet!'); return; }
    if (data[claimedKey]) { showToast('Already claimed!'); return; }

    const ref = window._db_doc(`users/${uid}`);
    try {
      await window._fs_updateDoc(ref, {
        [claimedKey]: true,
        beans: window._fs_increment(quest.reward),
        questsCompleted: window._fs_increment(1)
      });
      window._userData[claimedKey] = true;
      window._userData.beans = (window._userData.beans ?? 0) + quest.reward;
      window._userData.questsCompleted = (window._userData.questsCompleted ?? 0) + 1;

      updateBeansUI(window._userData.beans);
      showBeansPopup(quest.reward);
      showToast(`+${quest.reward} beans claimed! 🫘`);
      renderQuests(window._userData);
    } catch(e) { showToast('Error claiming reward.'); }
  };
</script>

<script>
  window._QUEST_DEFS = [
    { key: 'quest_play5',     title: 'Play 5 Games',      max: 5,  reward: 50,  icon: 'play',   desc: 'Play any 5 mini-games', section: 'Gameplay' },
    { key: 'quest_play10',    title: 'Play 10 Games',     max: 10, reward: 100, icon: 'play',   desc: 'Play any 10 mini-games', section: 'Gameplay' },
    { key: 'quest_play20',    title: 'Play 20 Games',     max: 20, reward: 250, icon: 'play',   desc: 'Play any 20 mini-games', section: 'Gameplay' },
    { key: 'quest_visitShop', title: 'Visit the Shop',    max: 1,  reward: 20,  icon: 'shop',   desc: 'Browse the Skeld.G store', section: 'Social' },
    { key: 'quest_login3',    title: 'Log in 3 Days',     max: 3,  reward: 60,  icon: 'cal',    desc: 'Return on 3 different days', section: 'Social' },
  ];

  function getQuestIcon(icon) {
    const icons = {
      play: '<path d="M8 5v14l11-7z"/>',
      shop: '<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>',
      cal: '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
      trophy: '<path d="M8 21h8M12 17v4M7 4H4a1 1 0 0 0-1 1v2a4 4 0 0 0 4 4h10a4 4 0 0 0 4-4V5a1 1 0 0 0-1-1h-3"/><rect x="7" y="2" width="10" height="12" rx="2"/>',
    };
    return icons[icon] || icons.play;
  }

  function renderQuests(data) {
    document.getElementById('quests-loading').style.display = 'none';
    const container = document.getElementById('quests-container');
    container.style.display = 'block';

    const QUEST_DEFS = window._QUEST_DEFS;
    let totalPossible = 0;
    let totalEarnable = 0;
    let sectionHTML = {};

    QUEST_DEFS.forEach(q => {
      const progress = data[q.key] ?? 0;
      const claimedKey = 'claimed_' + q.key.replace('quest_', '');
      const claimed = data[claimedKey] ?? false;
      const complete = progress >= q.max;
      const pct = Math.min(100, (progress / q.max) * 100);

      totalPossible += q.reward;
      if (!claimed) totalEarnable += q.reward;

      const cardClass = ['quest-card', complete ? 'complete' : '', claimed ? 'claimed' : ''].join(' ').trim();
      const iconClass = complete ? 'quest-icon-wrap done' : 'quest-icon-wrap';

      const rightHTML = claimed
        ? `<div class="quest-reward-badge"><img src="/bean.png" alt="" onerror="this.style.display='none'"/>${q.reward}</div><span class="btn-claimed">✓ Done</span>`
        : complete
          ? `<div class="quest-reward-badge"><img src="/bean.png" alt="" onerror="this.style.display='none'"/>${q.reward}</div><button class="btn-claim" onclick="claimQuest('${q.key}')">Claim!</button>`
          : `<div class="quest-reward-badge"><img src="/bean.png" alt="" onerror="this.style.display='none'"/>${q.reward}</div>`;

      const card = `
        <div class="${cardClass}">
          <div class="${iconClass}">
            <svg viewBox="0 0 24 24">${getQuestIcon(q.icon)}</svg>
          </div>
          <div class="quest-body">
            <div class="quest-title">${q.title}</div>
            <div class="quest-desc">${q.desc}</div>
            <div class="quest-bar"><div class="quest-bar-fill ${complete ? 'done' : ''}" style="width:${pct}%"></div></div>
            <div class="quest-counts"><span>${claimed ? 'Complete ✓' : `${progress} / ${q.max}`}</span><span>${q.section}</span></div>
          </div>
          <div class="quest-right">${rightHTML}</div>
        </div>`;

      if (!sectionHTML[q.section]) sectionHTML[q.section] = [];
      sectionHTML[q.section].push(card);
    });

    // Update summary
    const completedCount = QUEST_DEFS.filter(q => {
      const claimedKey = 'claimed_' + q.key.replace('quest_', '');
      return data[claimedKey];
    }).length;
    document.getElementById('qs-sub').textContent = `${completedCount} / ${QUEST_DEFS.length} complete`;
    document.getElementById('qs-total-reward').textContent = totalEarnable;

    container.innerHTML = Object.entries(sectionHTML).map(([section, cards]) =>
      `<div class="section-label">${section}</div>${cards.join('')}`
    ).join('');
  }

  function updateBeansUI(amount) {
    document.getElementById('header-beans').textContent = Number(amount).toLocaleString();
  }
  window.updateBeansUI = updateBeansUI;

  function showBeansPopup(amount) {
    const badge = document.getElementById('beans-badge-header');
    const rect = badge.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.className = 'beans-earn-pop';
    pop.textContent = '+' + amount + ' 🫘';
    pop.style.left = rect.left + 'px';
    pop.style.top = (rect.top - 10) + 'px';
    document.body.appendChild(pop);
    setTimeout(() => pop.remove(), 1500);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
  window.showToast = showToast;
</script>
